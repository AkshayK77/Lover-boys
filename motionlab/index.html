<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Capacitor / PWA: full-screen, no bounce, safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MotionLab" />
    <meta name="theme-color" content="#264653" />

    <!-- SEO -->
    <title>MotionLab — Train with Understanding</title>
    <meta name="description" content="Sports science education, AI-powered training, and sport-specific performance tracking in one platform. Train with Understanding." />

    <!-- Open Graph -->
    <meta property="og:title" content="MotionLab — Train with Understanding" />
    <meta property="og:description" content="Sports science education meets intelligent fitness tracking. For every athlete." />
    <meta property="og:type" content="website" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
